<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WRMC Prototype</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1A1A1E;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  /* ── Background pattern ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 40%, rgba(255,194,32,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 60%, rgba(255,194,32,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ── Phone shell ── */
  .phone {
    position: relative;
    width: 430px;
    height: 932px;
    background: #0A0A0A;
    border-radius: 54px;
    box-shadow:
      0 0 0 1px #3A3A3A,
      0 0 0 3px #1C1C1C,
      0 0 0 4px #3A3A3A,
      0 60px 120px rgba(0,0,0,0.8),
      0 20px 40px rgba(0,0,0,0.6);
    flex-shrink: 0;
  }

  /* Side buttons */
  .phone::before {
    content: '';
    position: absolute;
    left: -5px;
    top: 140px;
    width: 4px;
    height: 36px;
    background: #2A2A2A;
    border-radius: 2px 0 0 2px;
    box-shadow: 0 54px 0 #2A2A2A, 0 108px 0 #2A2A2A;
  }
  .phone::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 180px;
    width: 4px;
    height: 72px;
    background: #2A2A2A;
    border-radius: 0 2px 2px 0;
  }

  /* ── Screen area ── */
  .screen {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    bottom: 12px;
    border-radius: 44px;
    overflow: hidden;
    background: #000;
  }

  /* ── App iframe ── */
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 44px;
    display: block;
  }



  /* ── Scale for smaller screens ── */
  @media (max-height: 980px) {
    .phone { transform: scale(0.88); transform-origin: center center; }
  }
  @media (max-height: 860px) {
    .phone { transform: scale(0.76); transform-origin: center center; }
  }
  @media (max-height: 760px) {
    .phone { transform: scale(0.64); transform-origin: center center; }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="screen">
    <iframe
      id="app-frame"
      src="https://wrmc.vercel.app"
      title="WRMC Prototype"
      allow="camera"
    ></iframe>

  </div>
</div>



</body>
</html>
